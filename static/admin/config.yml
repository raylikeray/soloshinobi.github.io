backend:
  name: github
  repo: soloshinobi/soloshinobi.github.io
  branch: main

local_backend: true

media_folder: "static/images"
public_folder: "/images"

collections:
  - name: "chapters"
    label: "Chapters"
    folder: "content/chapters"
    create: true
    slug: "{{fields.chapter_number}}-{{slug}}"
    sortable_fields: ["chapter_number", "title", "date"]
    view_filters:
      - label: "Drafts"
        field: draft
        pattern: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Chapter Number", name: "chapter_number", widget: "number", value_type: "int", min: 1 }
      - label: "Arc"
        name: "arc"
        widget: "select"
        options:
          - "Awakening"
          - "The Nara Compound"
          - "Academy Days"
      - label: "Book"
        name: "book"
        widget: "select"
        options:
          - { label: "Book 1", value: 1 }
          - { label: "Book 2", value: 2 }
          - { label: "Book 3", value: 3 }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Draft", name: "draft", widget: "boolean", default: true }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "pages"
    label: "Pages"
    files:
      - label: "Homepage"
        name: "home"
        file: "content/_index.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
